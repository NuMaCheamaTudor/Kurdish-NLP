[paths]
train = "pos_train.spacy"
dev = "pos_dev.spacy"
vectors = null
init_tok2vec = null

[nlp]
lang = "xx"
pipeline = ["transformer", "morphologizer", "tagger", "parser"]
batch_size = 1
disabled = []
before_creation = null
after_creation = null
after_pipeline_creation = null

[training]
seed = 42
gpu_allocator = "pytorch"
dropout = 0.1
max_epochs = 30
patience = 8000
eval_frequency = 200
frozen_components = []
annotating_components = []
dev_corpus = "corpora.dev"
train_corpus = "corpora.train"
accumulate_gradient = 1
max_steps = 20000
before_to_disk = null
before_update = null

[corpora]

[system]
seed = 0
gpu_allocator = null

[initialize]
vectors = ${paths.vectors}
init_tok2vec = ${paths.init_tok2vec}
vocab_data = null
lookups = null
before_init = null
after_init = null

[components]

[pretraining]

[nlp.tokenizer]
@tokenizers = "spacy.Tokenizer.v1"

[nlp.vectors]
@vectors = "spacy.Vectors.v1"

[training.logger]
@loggers = "spacy.ConsoleLogger.v1"
progress_bar = true

[training.optimizer]
@optimizers = "Adam.v1"
beta1 = 0.9
beta2 = 0.999
L2_is_weight_decay = true
L2 = 0.01
grad_clip = 0.5
use_averages = false
eps = 1e-08

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = true
tolerance = 0.2
get_length = null

[training.score_weights]
pos_acc = 0.0
morph_acc = 0.2
morph_per_feat = null
tag_acc = 0.4
tag_micro_p = null
tag_micro_r = null
tag_micro_f = null
dep_uas = 0.2
dep_las = 0.2
dep_las_per_type = null
sents_p = null
sents_r = null
sents_f = 0.0

[corpora.train]
@readers = "spacy.Corpus.v1"
path = ${paths.train}
max_length = 64
gold_preproc = false
limit = 0
augmenter = null

[corpora.dev]
@readers = "spacy.Corpus.v1"
path = ${paths.dev}
max_length = 64
gold_preproc = false
limit = 0
augmenter = null

[initialize.tokenizer]

[initialize.components]

[components.transformer]
factory = "transformer"
max_batch_items = 4096

[components.morphologizer]
factory = "morphologizer"
overwrite = true
extend = false
label_smoothing = 0.0

[components.tagger]
factory = "tagger"
overwrite = false
neg_prefix = "!"
label_smoothing = 0.0

[components.parser]
factory = "parser"
moves = null
update_with_oracle_cut_size = 100
learn_tokens = false
min_action_freq = 30

[training.optimizer.learn_rate]
@schedules = "warmup_linear.v1"
warmup_steps = 200
total_steps = 20000
initial_rate = 2e-05

[training.batcher.size]
@schedules = "compounding.v1"
start = 50
stop = 150
compound = 1.001
t = 0.0

[components.transformer.model]
@architectures = "spacy-transformers.TransformerModel.v3"
name = "xlm-roberta-base"
mixed_precision = false

[components.transformer.set_extra_annotations]
@annotation_setters = "spacy-transformers.null_annotation_setter.v1"

[components.morphologizer.model]
@architectures = "spacy.Tagger.v2"
nO = null
normalize = false

[components.morphologizer.scorer]
@scorers = "spacy.morphologizer_scorer.v1"

[components.tagger.model]
@architectures = "spacy.Tagger.v2"
nO = null
normalize = false

[components.tagger.scorer]
@scorers = "spacy.tagger_scorer.v1"

[components.parser.model]
@architectures = "spacy.TransitionBasedParser.v2"
state_type = "parser"
extra_state_tokens = false
hidden_width = 128
maxout_pieces = 3
use_upper = true
nO = null

[components.parser.scorer]
@scorers = "spacy.parser_scorer.v1"

[components.transformer.model.get_spans]
@span_getters = "spacy-transformers.strided_spans.v1"
window = 64
stride = 32

[components.transformer.model.tokenizer_config]
use_fast = true

[components.transformer.model.transformer_config]

[components.transformer.model.grad_scaler_config]

[components.morphologizer.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0
upstream = "transformer"

[components.tagger.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0
upstream = "transformer"

[components.parser.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0
upstream = "transformer"

[components.morphologizer.model.tok2vec.pooling]
@layers = "reduce_mean.v1"

[components.tagger.model.tok2vec.pooling]
@layers = "reduce_mean.v1"

[components.parser.model.tok2vec.pooling]
@layers = "reduce_mean.v1"